<!-- =====================================================================
     FAQ live-search  ·  paste into an Avada CODE BLOCK element
     (NOT a Text element) placed directly above the first FAQ accordion.

     WHY A CODE BLOCK: a Text element runs this through WordPress's wpautop,
     which injects <p></p> tags into the <script> and breaks it (the box
     renders but does nothing). A Code Block base64-encodes its content, so
     the script stays intact.

     This version is hardened anyway: the script is a SINGLE LINE (no blank
     lines for wpautop to turn into <p>), it searches the whole document
     (not a .rpr-help scope), and the input is inline-styled so it looks
     right wherever it sits. It targets Avada's accordion DOM
     (.fusion-accordian / .fusion-panel / .panel-collapse).
     ===================================================================== -->
<div class="rpr-faq-search" style="margin:16px 0 8px;"><input id="rprFaqSearch" type="text" placeholder="Search the FAQ — e.g. webhook, leads, form not showing" autocomplete="off" aria-label="Search the FAQ" style="width:100%;padding:12px 14px;font:inherit;font-size:15px;color:#17171a;background:#fff;border:1px solid #d2cfc7;border-radius:4px;outline:none;"></div>
<script>
(function(){var i=document.getElementById('rprFaqSearch');if(!i)return;var run=function(){var q=i.value.trim().toLowerCase();Array.prototype.forEach.call(document.querySelectorAll('.fusion-accordian,.fusion-accordion'),function(acc){var vis=0;Array.prototype.forEach.call(acc.querySelectorAll('.fusion-panel'),function(pn){var match=!q||pn.textContent.toLowerCase().indexOf(q)!==-1;pn.style.display=match?'':'none';var body=pn.querySelector('.panel-collapse');var link=pn.querySelector('.panel-title a');if(body){if(q&&match){body.classList.add('in','show');body.style.height='';if(link){link.setAttribute('aria-expanded','true');if(link.classList)link.classList.remove('collapsed');}}else{body.classList.remove('in','show');if(link){link.setAttribute('aria-expanded','false');if(link.classList)link.classList.add('collapsed');}}}if(match){vis++;}});var h=acc.previousElementSibling;if(h){h.style.display=(q&&vis===0)?'none':'';}});};i.addEventListener('input',run);})();
</script>
