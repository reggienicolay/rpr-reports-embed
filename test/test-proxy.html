<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test: Widget with Proxy (Phase 2)</title>
  <style>
    body { font-family: system-ui; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.3em; }
    .info { background: #f0f7ff; border: 1px solid #b3d4fc; padding: 12px 16px; border-radius: 8px; margin-bottom: 24px; font-size: 14px; }
    code { background: #e8e8e8; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Phase 2 Test: Widget with data-proxy</h1>
  <div class="info">
    <strong>Setup:</strong> Run <code>cd worker && npx wrangler dev</code> on port 8787,
    then <code>npx serve -l 3000</code> in the project root.<br>
    This page sends leads to the local Worker proxy at <code>http://localhost:8787/agt_testtoken000001</code>.
  </div>

  <script
    src="../rpr-reports-embed.js"
    data-reports='[{"label":"Downtown Miami","url":"https://narrpr.com/test/downtown-miami"},{"label":"Coral Gables","url":"https://narrpr.com/test/coral-gables"}]'
    data-proxy="http://localhost:8787/agt_testtoken000001"
    data-agent-name="Test Agent (Proxy)"
    data-brokerage="RPR Test Brokerage"
    data-display-mode="inline"
    data-headline="Proxy Test - Get Your Market Report"
    data-subheadline="This form submits through the Cloudflare Worker proxy."
    data-btn-label="Submit via Proxy"
  ></script>
</body>
</html>
